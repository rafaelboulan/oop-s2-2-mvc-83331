name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build (Release)
      run: dotnet build onvatenter.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test onvatenter.Tests/onvatenter.Tests.csproj --configuration Release --no-build --verbosity normal

    - name: Publish
      run: dotnet publish onvatenter.Web/onvatenter.Web.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp
