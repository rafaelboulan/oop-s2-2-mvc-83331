name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore onvatenter.sln

    - name: Build (Release)
      run: dotnet build onvatenter.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test onvatenter.Tests/onvatenter.Tests.csproj --configuration Release --verbosity normal

    # 👉 On crée un petit fichier HTML (fake deploy)
    - name: Create simple report
      run: |
        mkdir coveragereport
        echo "<h1>Build OK ✅</h1><p>Tests passed 🚀</p>" > coveragereport/index.html

    # 👉 Upload pour GitHub Pages
    - name: Upload Pages artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./coveragereport

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4